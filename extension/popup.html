<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <style>
    body {
      width: 240px;
      padding: 16px;
      font-family: 'Inter', sans-serif;
      background: #fdfcfb;
      color: #002244;
      margin: 0;
    }
    h1 { font-size: 14px; font-weight: 800; margin: 0 0 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    p  { font-size: 11px; color: #475569; margin: 0 0 14px; }
    .tip { font-size: 11px; background: #e0f2fe; color: #002244; padding: 10px 12px; border-radius: 10px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>File Collector</h1>
  <p>Ivory Archive</p>
  <div class="tip">
    Navigate to any YouTube video and click the <strong>Collect</strong> button in the bottom-right corner to save it to your archive.
  </div>
</body>
</html>
